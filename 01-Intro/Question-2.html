<html>
	<head>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
	<style>
		.carousel-inner img
		{
			height:400px;
			object-fit:contain;
		}
		.carousel-control-prev-icon,
		.carousel-control-next-icon {
			filter: invert(1);
		}
	</style>
	<script>
		function loadFile(obj)
		{
			var files=obj.files;
			var carouselInner=document.getElementById("carouselInner1");
			carouselInner.innerHTML="";
			
			for(var i=0;i<files.length;i++)
			{
				var filereader=new FileReader();
				filereader.onload=function(e)
				{
					var div=document.createElement("div");
					div.className="carousel-item";
					
					var img=document.createElement("img");
					img.className = "d-block w-100";
					img.src=e.target.result;
					
					div.appendChild(img);
					carouselInner.appendChild(div);

					
					if (carouselInner.children.length === 1) 
					{
						div.classList.add("active");
					}
				}
				filereader.readAsDataURL(files[i]);
			}
			
		}
		async function getImageCaption(imageFile)
		{
			const response = await fetch(
				"https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-base",
				{
					method: "POST",
					headers: {
						"Authorization": "Bearer API_KEY"
					},
					body: imageFile
				}
			);

			const data = await response.json();
			return data[0].generated_text;
		}
		
		function loadImages(obj)
		{
			var files = obj.files;
			var carouselInner = document.getElementById("carouselInner2");
			carouselInner.innerHTML = "";

			let images = [];
			let loaded = 0;

			for(let i = 0; i < files.length; i++)
			{
				let reader = new FileReader();

				reader.onload = function(e)
				{
					images[i] = e.target.result;
					loaded++;

					if(loaded === files.length)
					{
						createSlides(images,files);
					}
				}

				reader.readAsDataURL(files[i]);
			}
		}
		function createSlides(images, files)
		{
			var carouselInner = document.getElementById("carouselInner2");

			for(let i = 0; i < images.length; i += 3)
			{
				var slide = document.createElement("div");
				slide.className = "carousel-item";

				if(i === 0)
				slide.classList.add("active");

				var container = document.createElement("div");
				container.className = "container";

				var row = document.createElement("div");
				row.className = "row";

				for(let j = i; j < i + 3 && j < images.length; j++)
				{
					var col = document.createElement("div");
					col.className = "col-lg-4";

					var card = document.createElement("div");
					card.className = "card";

					var img = document.createElement("img");
					img.className = "card-img-top";
					img.src = images[j];

					var body = document.createElement("div");
					body.className = "card-body";

					var title = document.createElement("h5");
					title.className = "card-title";
					title.innerText = "Analyzing image...";

					var btn = document.createElement("button");
					btn.className = "btn btn-primary";
					btn.innerText = "View";

					body.appendChild(title);
					body.appendChild(btn);

					card.appendChild(img);
					card.appendChild(body);

					col.appendChild(card);
					row.appendChild(col);
					getImageCaption(files[j]).then(caption=>{
						title.innerText = caption;
					}).catch(()=>{
						title.innerText = "Caption not available";
					});
				}

				container.appendChild(row);
				slide.appendChild(container);
				carouselInner.appendChild(slide);
			}
		}
	</script>
	</head>
	<body>
		<input type="file" id="imagefile" multiple onchange="loadFile(this)">
		<div id="carouselExample" class="carousel slide">
		<div class="carousel-inner" id="carouselInner1">
		</div>
		<button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
			<span class="carousel-control-prev-icon"></span>
		</button>

		<button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
			<span class="carousel-control-next-icon"></span>
		</button>
		</div>
		
		<input type="file" multiple onchange="loadImages(this)">

		<div id="carouselMultiItemExample" class="carousel slide">
		  <div class="carousel-inner py-4" id="carouselInner2"></div>

		  <button class="carousel-control-prev" type="button" data-bs-target="#carouselMultiItemExample" data-bs-slide="prev">
			<span class="carousel-control-prev-icon"></span>
		  </button>

		  <button class="carousel-control-next" type="button" data-bs-target="#carouselMultiItemExample" data-bs-slide="next">
			<span class="carousel-control-next-icon"></span>
		  </button>
		</div>
		
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	</body>
</html>
